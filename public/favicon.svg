<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#1c0a38"/>

  <!-- Left lion: mane -->
  <circle cx="21" cy="33" r="16" fill="#c8baa8" opacity="0.3"/>
  <!-- Left lion: head -->
  <circle cx="21" cy="33" r="11" fill="#e8e0d5"/>
  <!-- Left lion: ears -->
  <polygon points="11,22 13,8 22,18" fill="#e8e0d5"/>
  <polygon points="22,18 28,8 31,20" fill="#e8e0d5"/>
  <!-- Left lion: eye -->
  <circle cx="18" cy="31" r="2" fill="#1c0a38"/>
  <!-- Left lion: nose -->
  <circle cx="24" cy="36" r="1.2" fill="#c8baa8"/>

  <!-- Right lion: mane -->
  <circle cx="79" cy="33" r="16" fill="#c8baa8" opacity="0.3"/>
  <!-- Right lion: head -->
  <circle cx="79" cy="33" r="11" fill="#e8e0d5"/>
  <!-- Right lion: ears -->
  <polygon points="89,22 87,8 78,18" fill="#e8e0d5"/>
  <polygon points="78,18 72,8 69,20" fill="#e8e0d5"/>
  <!-- Right lion: eye -->
  <circle cx="82" cy="31" r="2" fill="#1c0a38"/>
  <!-- Right lion: nose -->
  <circle cx="76" cy="36" r="1.2" fill="#c8baa8"/>

  <!-- M centered at bottom -->
  <text
    x="50" y="86"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50"
    font-weight="bold"
    fill="#e8e0d5"
  >M</text>
</svg>
